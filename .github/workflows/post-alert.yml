name: Post Alert

on:
  repository_dispatch:
    types: [post_alert]

jobs:
  update-alerts:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Update alerts.json
        run: |
          FILE=data/alerts.json
          TITLE="${{ github.event.client_payload.title }}"
          MESSAGE="${{ github.event.client_payload.message }}"
          TIMESTAMP="${{ github.event.client_payload.timestamp }}"

          if [ ! -f "$FILE" ]; then
            echo "[]" > "$FILE"
          fi

          jq ". += [{\"title\": \"$TITLE\", \"message\": \"$MESSAGE\", \"timestamp\": \"$TIMESTAMP\"}]" "$FILE" > tmp.json
          mv tmp.json "$FILE"

      - name: Commit changes
        run: |
          git config user.name "PWA Bot"
          git config user.email "bot@example.com"
          git add data/alerts.json
          git commit -m "New alert posted" || echo "No changes to commit"
          git push
