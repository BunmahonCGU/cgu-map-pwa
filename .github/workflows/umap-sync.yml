name: Sync uMap to GitHub

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:        # allow manual run

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download latest uMap export
        run: |
          curl -L "https://umap.openstreetmap.fr/en/map/bunmahon-cgu-access-points_1393298/export/?format=umap" \
            -o latest.umap

      - name: Compare with existing file
        id: diff
        run: |
          if cmp -s latest.umap data/bunmahon-latest.umap; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Update repo if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          mv latest.umap data/bunmahon-latest.umap
          git config user.name "GitHub Action"
          git config user.email "actions@github.com"
          git add data/bunmahon-latest.umap
          git commit -m "Auto-sync uMap update"
          git push
