<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#003366">
<link rel="icon" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunmahon CGU Access Map</title>
    <!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <!-- App Styles -->
    <style>
 /* ============================================================
   BASE LAYOUT
   ============================================================ */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
}

#map {
    width: 100%;
    height: 100%;
}

.user-location-icon {
    width: 28px;
    height: 28px;
    background: #3388ff;
    border: 4px solid white;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(0,0,0,0.4);
}

/* ============================================================
   ADMIN PANEL
   ============================================================ */
.admin-button {
    position: absolute;
    bottom: 80px;
    right: 10px;
    z-index: 9999;
}

#admin-panel {
    position: absolute;
    bottom: 50px;
    left: 10px;
    right: 10px;
    background: white;
    padding: 12px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    z-index: 9999;
}

#admin-panel input,
#admin-panel textarea {
    width: 100%;
    margin-bottom: 8px;
}

@media (max-width: 600px) {
    #admin-panel {
        bottom: 120px;
    }
}

/* ============================================================
   ALERTS PANEL
   ============================================================ */
#alerts-panel {
    position: absolute;
    top: 110px;
    left: 10px;
    width: calc(100% - 20px);
    max-width: 360px;
    max-height: 50%;
    overflow-y: auto;
    background: rgba(255,255,255,0.95);
    padding: 10px;
    border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    z-index: 9999;
}

@media (max-width: 600px) {
    #alerts-panel {
        width: 78vw;
        max-width: 350px;
        left: 8px;
        top: 140px;
        max-height: 40%;
    }
}

#alerts-list {
    list-style: none;
    margin: 0;
    padding: 0;
}

.alert-row {
    display: grid;
    grid-template-columns: 60px 1fr;
    gap: 8px;
    padding: 4px 0;
    border-bottom: 1px solid #ddd;
}

.alert-date {
    font-size: 12px;
    font-weight: bold;
    color: #555;
}

.alert-body {
    font-size: 14px;
    color: #333;
    width: calc(100% - 60px);
    word-wrap: break-word;
    padding-left: 2px;
}

.hidden {
    display: none;
}

/* ============================================================
   POPUP (MOBILE‑OPTIMIZED, RESPONSIVE, VIDEO‑FRIENDLY)
   ============================================================ */

/* Wrapper: default width for normal popups */
.leaflet-popup-content-wrapper {
    max-width: 260px !important;
    width: auto !important;
    overflow: visible !important;
}

/* Content: the ONLY scrollable element */
.leaflet-popup-content {
    max-height: 70vh;
    overflow-y: auto;
    word-wrap: break-word;
    overflow-wrap: break-word;
    -webkit-overflow-scrolling: touch;
}

/* Images scale properly */
.leaflet-popup-content img {
    max-width: 100% !important;
    height: auto !important;
    display: block;
}

/* Responsive iframes (YouTube/Vimeo) */
.leaflet-popup-content iframe {
    width: 100% !important;
    height: auto !important;
    aspect-ratio: 16 / 9;
    min-height: 150px;
    display: block;
    margin-top: 6px;
}

/* ============================================================
   WIDER POPUP WHEN VIDEO IS PRESENT
   ============================================================ */

/* Expand popup width when iframe is present */
.leaflet-popup-content-wrapper:has(iframe) {
    max-width: 90vw !important;
    width: 90vw !important;
    margin: 0 auto;
}


/* Grab handle for swipe-down */
.popup-grab {
    width: 40px;
    height: 5px;
    background: #ccc;
    border-radius: 3px;
    margin: 6px auto 10px auto;
}


/* Ensure Leaflet controls stay visible */
.leaflet-control {
    opacity: 1 !important;
    visibility: visible !important;
    display: block !important;
}

/* Locate button active state */
.leaflet-control-locate.locate-active {
    background: #0078ff !important;
    color: white !important;
}

</style>
  
</head>
<body>

    <!-- Map Container -->
    <div id="map"></div>

   
<button id="refreshMapBtn" style="
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 9999;
  padding: 10px 14px;
  background: #0078ff;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
">
  Refresh Map Data
</button>

<button id="admin-open" class="admin-button">Admin</button>

<div id="admin-panel" class="hidden">

  <h3>Post Update</h3>

  <input id="admin-title" type="text" placeholder="Title" style="width:100%; margin-bottom:6px;">

  <textarea id="admin-message" placeholder="Message..." 
            style="width:100%; height:80px; margin-bottom:6px;"></textarea>

  <div id="token-status"
       style="font-size: 12px; margin-top: 6px; font-weight: 600;">
    Checking token…
  </div>

  <button id="admin-submit" style="width:100%; margin-top:8px;">Submit Update</button>

  <!-- ✅ Close button correctly placed INSIDE the panel -->
  <button id="admin-close" style="
    width:100%;
    margin-top:8px;
    background:#444;
    color:white;
    padding:8px;
    border:none;
    border-radius:4px;
  ">
    Close
  </button>
</div>


<div id="latest-alert" style="padding:10px; background:#fff3cd; display:none;">
  <strong>Latest Update:</strong>
  <span id="latest-alert-text"></span>
</div>


<div id="alerts-panel" class="hidden">
  <h3>Updates</h3>
  <ul id="alerts-list"></ul>
</div>
 <!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

     <script src="js/map.js?v=4"></script>
    
    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
<script>
navigator.serviceWorker.addEventListener("controllerchange", () => {
    window.location.reload();
});
</script>

    
</body>

    
</html>
