<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#003366">
<link rel="icon" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunmahon CGU Access Map</title>

    <!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />




    <!-- App Styles -->
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }
.user-location-icon {
    width: 28px;
    height: 28px;
    background: #3388ff;
    border: 4px solid white;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(0,0,0,0.4);
}
        #map {
            width: 100%;
            height: 100%;
        }

  .admin-button {
  position: absolute;
  bottom: 10px;
  right: 10px;
  z-index: 9999;
}

#admin-panel {
  position: absolute;
  bottom: 50px;
  left: 10px;
  right: 10px;
  background: white;
  padding: 12px;
  border-radius: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  z-index: 9999;
}

#admin-panel input,
#admin-panel textarea {
  width: 100%;
  margin-bottom: 8px;
}

#alerts-panel {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  max-height: 40%;
  overflow-y: auto;
  background: rgba(255,255,255,0.95);
  padding: 10px;
  border-radius: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  z-index: 9998;
}

.hidden {
  display: none;
}

    </style>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
<style>
.leaflet-control-locate.locate-active {
    background: #0078ff !important;
    color: white !important;
}
</style>

</head>
<body>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>

    <script src="js/map.js?v=3"></script>
<button id="refreshMapBtn" style="
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 9999;
  padding: 10px 14px;
  background: #0078ff;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
">
  Refresh Map Data
</button>
<button id="admin-open" class="admin-button">Admin</button>

<div id="admin-panel" class="hidden">
  <h3>Post update</h3>
  <input id="admin-title" placeholder="Title">
  <textarea id="admin-message" placeholder="Message"></textarea>
  <button id="admin-submit">Submit</button>
</div>

<div id="alerts-panel" class="hidden">
  <h3>Updates</h3>
  <ul id="alerts-list"></ul>
</div>


</body>
</html>
